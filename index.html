  x.setDate(x.getDate() - day);

};

/* ---------- Claude calls (via Supabase edge function; key is server-side) ---------- */
const KEY_MSG = "The AI service is still connecting — try again in a moment.";
async function askClaude(messages, tools) {
  if (!supa) throw new Error("Backend unavailable — the Supabase library didn't load.");
  await authReady;
  const body = { messages };
  if (tools) body.tools = tools;
  const { data, error } = await supa.functions.invoke("claude-proxy", { body });
  if (error) {
    let msg = error.message || "Request failed";
    try { const ctx = error.context && (await error.context.json()); if (ctx && ctx.error) msg = ctx.error; } catch (_) {}
    throw new Error(msg);
  }
  if (data && data.error) throw new Error(data.error);
  return data && data.text ? data.text : "";
}
const parseJSON = (text) => {
  const clean = text.replace(/```json|```/g, "").trim();
  const fb = clean.indexOf("[");
  const fo = clean.indexOf("{");
  const start = fb === -1 ? fo : fo === -1 ? fb : Math.min(fb, fo);
  if (start < 0) throw new Error("no JSON found");
  const close = clean[start] === "[" ? "]" : "}";
  const end = clean.lastIndexOf(close);
  return JSON.parse(clean.slice(start, end + 1));
};

  const [freeBlocks, setFreeBlocks] = useState([]);// { id, week, day, start, end, minutes }
  const [xp, setXp] = useState(0);
  const [scores, setScores] = useState({});        // { "Topic name": bestPct }
  const [quizTopic, setQuizTopic] = useState(null);
  const [courseTopic, setCourseTopic] = useState(null);
  const [courses, setCourses] = useState({});      // { topic: {brief, lessons, work} }
  const [work, setWork] = useState({});            // { topic: {0:true, 1:true} }
  const [bonus, setBonus] = useState({});          // { topic: true } — coursework XP paid once
  const [promotion, setPromotion] = useState(null);// rank name, shown after a promotion
  const [bests, setBests] = useState({});          // arcade high scores

  const weekKey = iso(weekStart);

  /* ---------- persistence ---------- */
  useEffect(() => {
    (async () => {
      try {
        const r = store.get("ledger:v1");
        if (r && r.value) {
          const s = JSON.parse(r.value);
          setFocus(s.focus || {});
          setLogs(s.logs || []);
          setChallenges(s.challenges || []);
          setChecked(s.checked || {});
          setFreeBlocks(s.freeBlocks || []);
          setXp(s.xp || 0);
          setScores(s.scores || {});
          setBests(s.bests || {});
          setCourses(s.courses || {});
          setWork(s.work || {});
          setBonus(s.bonus || {});
        }
      } catch (e) {
        /* first run — nothing saved yet */
      }
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        store.set(
          "ledger:v1",
          JSON.stringify({
            focus, logs, challenges, checked, freeBlocks, xp, scores, bests,
            courses, work, bonus,
          })
        );
      } catch (e) {
        console.error("Could not save", e);
      }
    })();
  }, [loaded, focus, logs, challenges, checked, freeBlocks, xp, scores, bests, courses, work, bonus]);

  /* ---------- derived ---------- */
  const weekDates = useMemo(
    () => DAYS.map((_, i) => iso(addDays(weekStart, i))),
    [weekStart]
  );
  const weekLogs = logs.filter((l) => weekDates.includes(l.date));
  const minutesByDay = weekDates.map((d) =>
    weekLogs.filter((l) => l.date === d).reduce((a, b) => a + Number(b.minutes || 0), 0)
  );
  const weekMinutes = minutesByDay.reduce((a, b) => a + b, 0);
  const weekChallenges = challenges.filter((c) => c.week === weekKey);
  const weekFree = freeBlocks.filter((f) => f.week === weekKey);
  const totalTopics = TOPICS.reduce((a, g) => a + g.items.length, 0);
  const doneTopics = Object.keys(checked).length;
  const thisWeekFocus = focus[weekKey] || "";

  const setThisWeekFocus = (v) => setFocus((f) => ({ ...f, [weekKey]: v }));

  /* Single door for all XP — quizzes and games both come through here. */
  const awardXp = (earned) => {
    if (!earned) return 0;
    const before = rankIndex(xp);
    const after = rankIndex(xp + earned);
    setXp(xp + earned);
    if (after > before) setPromotion(RANKS[after]);
    return earned;
  };

  /* A quiz is finished: bank the score, award XP, check the topic off if they passed. */
  const finishQuiz = (topicName, pct) => {
    const earned = xpForScore(pct);
    setScores((s) => ({ ...s, [topicName]: Math.max(s[topicName] || 0, pct) }));
    if (earned > 0) {
      awardXp(earned);
      setChecked((c) => ({ ...c, [topicName]: iso(new Date()) }));
    }
    return earned;
  };

  const setBest = (game, val) =>
    setBests((b) => ({ ...b, [game]: Math.max(b[game] || 0, val) }));

  /* Coursework gates the quiz: every task ticked, or the quiz stays locked. */
  const workCount = (topicName) => {
    const c = courses[topicName];
    const done = Object.values(work[topicName] || {}).filter(Boolean).length;
    return { done, total: c ? c.work.length : 0 };
  };
  const isUnlocked = (topicName) => {
    const { done, total } = workCount(topicName);
    return total > 0 && done === total;
  };

  const toggleWork = (topicName, idx) => {
    const t = { ...(work[topicName] || {}) };
    t[idx] = !t[idx];
    setWork((w) => ({ ...w, [topicName]: t }));

    /* Finishing all the work pays 20 XP, once per topic. */
    const c = courses[topicName];
    const done = Object.values(t).filter(Boolean).length;
    if (c && done === c.work.length && !bonus[topicName]) {
      awardXp(20);
      setBonus((b) => ({ ...b, [topicName]: true }));
    }
  };

  const css = `
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Public+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');
    .lg * { box-sizing: border-box; }
    .lg { font-family: 'Public Sans', system-ui, sans-serif; color: ${C.ink}; background: ${C.white}; }
    .serif { font-family: 'Fraunces', Georgia, serif; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .eyebrow { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:${C.slate}; }
    .card { border:1px solid ${C.rule}; border-radius:2px; background:${C.white}; }
    .btn { font-family:'Public Sans',sans-serif; font-weight:600; font-size:13px; border:1px solid ${C.blue};
           background:${C.blue}; color:#fff; padding:9px 14px; border-radius:2px; cursor:pointer; transition:.15s; }
    .btn:hover:not(:disabled) { background:${C.deep}; border-color:${C.deep}; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .btn.ghost { background:transparent; color:${C.blue}; }
    .btn.ghost:hover:not(:disabled) { background:${C.sky}; color:${C.deep}; }
    .inp { width:100%; font-family:'Public Sans',sans-serif; font-size:15px; color:${C.ink};
           border:none; border-bottom:1.5px solid ${C.rule}; background:transparent; padding:8px 2px; outline:none; }
    .inp:focus { border-bottom-color:${C.blue}; }
    .inp::placeholder { color:#9DB0CC; }
    .lg :focus-visible { outline:2px solid ${C.blue}; outline-offset:2px; }
    .bar { transition: height .5s cubic-bezier(.2,.8,.2,1); }
    .row:hover { background:${C.sky}; }
    a { color:${C.blue}; }
    @media (prefers-reduced-motion: reduce) { .lg * { transition:none !important; animation:none !important; } }
  `;

  return (
    <div className="lg" style={{ minHeight: "100vh", padding: "0 0 80px" }}>
      <style>{css}</style>

      <Header
        weekStart={weekStart}
        setWeekStart={setWeekStart}
        weekMinutes={weekMinutes}
        doneTopics={doneTopics}
        totalTopics={totalTopics}
        challengesDone={weekChallenges.filter((c) => c.done).length}
        challengesTotal={weekChallenges.length}
        xp={xp}
      />

      <main
        style={{
          maxWidth: 1120,
          margin: "0 auto",
          padding: "0 24px",
          display: "grid",
          gap: 28,
        }}
      >
        <FocusAndLedger
          focus={thisWeekFocus}
          setFocus={setThisWeekFocus}
          weekDates={weekDates}
          minutesByDay={minutesByDay}
          freeBlocks={weekFree}
          onLog={(entry) => setLogs((l) => [...l, { id: Date.now(), ...entry }])}
          weekLogs={weekLogs}
          onDeleteLog={(id) => setLogs((l) => l.filter((x) => x.id !== id))}
        />

        <div
          style={{
            display: "grid",
            gridTemplateColumns: "repeat(auto-fit, minmax(330px, 1fr))",
            gap: 28,
          }}
        >
          <Challenges
            focus={thisWeekFocus}
            list={weekChallenges}
            add={(text) =>
              setChallenges((c) => [
                ...c,
                { id: Date.now() + Math.random(), week: weekKey, text, done: false },
              ])
            }
            toggle={(id) =>
              setChallenges((c) =>
                c.map((x) => (x.id === id ? { ...x, done: !x.done } : x))
              )
            }
            remove={(id) => setChallenges((c) => c.filter((x) => x.id !== id))}
          />
          <Sources defaultQuery={thisWeekFocus} />
        </div>

        <CalendarScan
          weekKey={weekKey}
          blocks={weekFree}
          setBlocks={(bs) =>
            setFreeBlocks((f) => [...f.filter((x) => x.week !== weekKey), ...bs])
          }
          clear={() => setFreeBlocks((f) => f.filter((x) => x.week !== weekKey))}
        />

        <Arcade onXp={awardXp} bests={bests} setBest={setBest} />

        <Checklist
          checked={checked}
          scores={scores}
          workCount={workCount}
          unlocked={isUnlocked}
          onCourse={(name) => setCourseTopic(name)}
          onReset={(name) =>
            setChecked((c) => {
              const n = { ...c };
              delete n[name];
              return n;
            })
          }
          onStudy={(name) => setThisWeekFocus(name)}
        />
      </main>

      {courseTopic && (
        <Course
          topic={courseTopic}
          course={courses[courseTopic]}
          cache={(c) => setCourses((cs) => ({ ...cs, [courseTopic]: c }))}
          work={work[courseTopic] || {}}
          toggleWork={(i) => toggleWork(courseTopic, i)}
          unlocked={isUnlocked(courseTopic)}
          bonusPaid={!!bonus[courseTopic]}
          best={scores[courseTopic]}
          onQuiz={() => {
            setCourseTopic(null);
            setQuizTopic(courseTopic);
          }}
          onClose={() => setCourseTopic(null)}
        />
      )}

      {quizTopic && (
        <Quiz
          topic={quizTopic}
          onClose={() => setQuizTopic(null)}
          onFinish={finishQuiz}
        />
      )}

      {promotion && <Promotion rank={promotion} onClose={() => setPromotion(null)} />}
    </div>
  );
}

/* ========================== Promotion ========================== */

  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(10,26,51,.6)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        zIndex: 60,
        padding: 20,
      }}
    >
      <div
        className="card"
        style={{ padding: "40px 48px", textAlign: "center", maxWidth: 420 }}
        onClick={(e) => e.stopPropagation()}
      >
        <div className="eyebrow" style={{ color: C.blue }}>Promoted</div>
        <h2 className="serif" style={{ fontSize: 40, margin: "8px 0 4px" }}>{rank}</h2>
        <p style={{ color: C.slate, fontSize: 14, marginTop: 0 }}>

/* ============================ Header ============================ */
function Header({
  weekStart,
  setWeekStart,
  weekMinutes,
  doneTopics,
  totalTopics,
  challengesDone,
  challengesTotal,
  xp,
}) {
  const idx = rankIndex(xp);
  const into = xpIntoRank(xp);
  const atTop = idx === RANKS.length - 1;
  const stat = (n, l) => (
    <div>
      <div className="mono" style={{ fontSize: 26, fontWeight: 600, color: C.blue }}>
        {n}
      </div>
      <div className="eyebrow" style={{ marginTop: 2 }}>{l}</div>
    </div>
  );
  return (
    <header
      style={{
        borderBottom: `1px solid ${C.rule}`,
        background: `linear-gradient(180deg, ${C.sky} 0%, ${C.white} 100%)`,
        marginBottom: 28,
      }}
    >
      <div style={{ maxWidth: 1120, margin: "0 auto", padding: "34px 24px 26px" }}>
        <div className="eyebrow">Weekly business learning</div>
        <h1
          className="serif"
          style={{ fontSize: 46, fontWeight: 600, margin: "6px 0 20px", letterSpacing: "-0.02em" }}
        >
          The Business Ledger
        </h1>

        {/* rank ladder — 17 rungs, one promotion every 100 XP */}
        <div
          style={{
            border: `1px solid ${C.rule}`,
            background: C.white,
            padding: "14px 18px",
            marginBottom: 22,
          }}
        >
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "baseline",
              gap: 12,
              flexWrap: "wrap",
            }}
          >
            <div>
              <span className="eyebrow">Rank {idx + 1} of {RANKS.length}</span>
              <div className="serif" style={{ fontSize: 26, fontWeight: 600, lineHeight: 1.1 }}>
                {RANKS[idx]}
              </div>
            </div>
            <div className="mono" style={{ fontSize: 12, color: C.slate, textAlign: "right" }}>
              <span style={{ color: C.blue, fontWeight: 600, fontSize: 15 }}>{xp} XP</span>
              <div>
                {atTop
                  ? "corner office"
                  : `${XP_PER_RANK - into} XP to ${RANKS[idx + 1]}`}
              </div>
            </div>

          <div style={{ display: "flex", gap: 3, marginTop: 12 }}>
            {RANKS.map((r, i) => (
              <div
                key={r}
                title={`${r} — ${i * XP_PER_RANK} XP`}
                style={{
                  flex: 1,
                  height: 8,
                  background: C.sky,
                  border: `1px solid ${i <= idx ? C.blue : C.rule}`,
                  position: "relative",
                  overflow: "hidden",
                }}
              >
                <div
                  className="bar"
                  style={{
                    position: "absolute",
                    inset: 0,
                    right: "auto",
                    width:
                      i < idx ? "100%" : i === idx ? `${atTop ? 100 : into}%` : "0%",
                    background: C.blue,
                  }}
                />
              </div>
            ))}
          </div>
          <div
            className="eyebrow"
            style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}
          >
            <span>Intern</span>
            <span>CEO</span>
          </div>
        </div>

        <div
          style={{
            display: "flex",
            flexWrap: "wrap",
            gap: 32,
            alignItems: "flex-end",
            justifyContent: "space-between",
          }}
        >
          <div style={{ display: "flex", gap: 32, flexWrap: "wrap" }}>
            {stat(`${Math.floor(weekMinutes / 60)}h ${weekMinutes % 60}m`, "Studied this week")}
            {stat(`${challengesDone}/${challengesTotal || 0}`, "Challenges cleared")}
            {stat(`${doneTopics}/${totalTopics}`, "Topics learned")}
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <button className="btn ghost" onClick={() => setWeekStart(addDays(weekStart, -7))}>
              ← Prev
            </button>
            <div className="mono" style={{ fontSize: 13, minWidth: 130, textAlign: "center" }}>
              {fmtRange(weekStart)}
            </div>
            <button className="btn ghost" onClick={() => setWeekStart(addDays(weekStart, 7))}>
              Next →
            </button>
          </div>
        </div>
      </div>
    </header>
  );
}

/* ==================== Focus + the week ledger ==================== */
function FocusAndLedger({
  focus,
  setFocus,
  weekDates,
  minutesByDay,
  freeBlocks,
  onLog,
  weekLogs,
  onDeleteLog,
}) {
  const [openDay, setOpenDay] = useState(null);
  const [topic, setTopic] = useState("");
  const [mins, setMins] = useState(30);
  const [note, setNote] = useState("");

  const max = Math.max(120, ...minutesByDay);
  const freeByDay = DAYS.map((_, i) =>
    freeBlocks.filter((f) => f.day === i).reduce((a, b) => a + Number(b.minutes || 0), 0)
  );
  const today = iso(new Date());

  const save = () => {
    if (!topic.trim()) return;
    onLog({ date: weekDates[openDay], topic: topic.trim(), minutes: Number(mins) || 0, note });
    setTopic("");
    setMins(30);
    setNote("");
    setOpenDay(null);
  };

  return (
    <section className="card" style={{ padding: "26px 28px" }}>
      <div className="eyebrow">This week I want to learn about</div>
      <input
        className="inp serif"
        style={{ fontSize: 28, fontWeight: 600, marginTop: 4, marginBottom: 26 }}
        placeholder="e.g. unit economics for a coffee cart"
        value={focus}
        onChange={(e) => setFocus(e.target.value)}
      />

      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
        <div className="eyebrow">Minutes logged — click a day to add</div>
        <div className="eyebrow">
          <span style={{ color: C.blue }}>■</span> studied &nbsp;
          <span style={{ color: C.rule }}>■</span> free time from calendar
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 8 }}>
        {DAYS.map((d, i) => {
          const m = minutesByDay[i];
          const f = freeByDay[i];
          const isToday = weekDates[i] === today;
          return (
            <button
              key={d}
              onClick={() => setOpenDay(openDay === i ? null : i)}
              style={{
                border: `1px solid ${openDay === i ? C.blue : C.rule}`,
                background: C.white,
                padding: 0,
                cursor: "pointer",
                borderRadius: 2,
                overflow: "hidden",
              }}
            >
              <div
                style={{
                  height: 130,
                  display: "flex",
                  alignItems: "flex-end",
                  position: "relative",
                  background: C.white,
                }}
              >
                <div
                  style={{
                    position: "absolute",
                    inset: 0,
                    height: `${Math.min(100, (f / max) * 100)}%`,
                    top: "auto",
                    bottom: 0,
                    background: C.sky,
                    borderTop: f ? `1px dashed ${C.rule}` : "none",
                  }}
                />
                <div
                  className="bar"
                  style={{
                    width: "100%",
                    height: `${Math.min(100, (m / max) * 100)}%`,
                    background: `linear-gradient(180deg, ${C.blue}, ${C.deep})`,
                    position: "relative",
                  }}
                />
              </div>
              <div
                style={{
                  borderTop: `1px solid ${C.rule}`,
                  padding: "6px 4px",
                  background: isToday ? C.blue : C.white,
                  color: isToday ? "#fff" : C.ink,
                }}
              >
                <div className="mono" style={{ fontSize: 11, fontWeight: 600 }}>{d}</div>
                <div className="mono" style={{ fontSize: 10, opacity: 0.7 }}>{m || "—"}</div>
              </div>
            </button>
          );
        })}
      </div>

      {openDay !== null && (
        <div
          style={{
            marginTop: 18,
            padding: 18,
            background: C.sky,
            border: `1px solid ${C.rule}`,
            display: "grid",
            gap: 12,
          }}
        >
          <div className="eyebrow">
            Log a session — {DAYS[openDay]}, {weekDates[openDay]}
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            <input
              className="inp"
              style={{ flex: "2 1 220px", background: C.white, padding: "8px 10px" }}
              placeholder="What did you learn?"
              value={topic}
              onChange={(e) => setTopic(e.target.value)}
            />
            <input
              className="inp mono"
              type="number"
              min="0"
              style={{ flex: "0 1 90px", background: C.white, padding: "8px 10px" }}
              value={mins}
              onChange={(e) => setMins(e.target.value)}
            />
            <input
              className="inp"
              style={{ flex: "2 1 220px", background: C.white, padding: "8px 10px" }}
              placeholder="One takeaway (optional)"
              value={note}
              onChange={(e) => setNote(e.target.value)}
            />
            <button className="btn" onClick={save}>Save session</button>
          </div>
        </div>
      )}

      {weekLogs.length > 0 && (
        <div style={{ marginTop: 22 }}>
          <div className="eyebrow" style={{ marginBottom: 8 }}>Sessions this week</div>
          {weekLogs
            .slice()
            .sort((a, b) => (a.date < b.date ? -1 : 1))
            .map((l) => (
              <div
                key={l.id}
                className="row"
                style={{
                  display: "flex",
                  gap: 12,
                  alignItems: "baseline",
                  padding: "8px 6px",
                  borderBottom: `1px solid ${C.rule}`,
                }}
              >
                <span className="mono" style={{ fontSize: 11, color: C.slate, width: 84 }}>
                  {l.date}
                </span>
                <span style={{ fontWeight: 600, fontSize: 14 }}>{l.topic}</span>
                <span className="mono" style={{ fontSize: 11, color: C.blue }}>{l.minutes}m</span>
                <span style={{ fontSize: 13, color: C.slate, flex: 1 }}>{l.note}</span>
                <button
                  onClick={() => onDeleteLog(l.id)}
                  style={{
                    border: "none",
                    background: "none",
                    color: C.slate,
                    cursor: "pointer",
                    fontSize: 16,
                  }}
                  aria-label="Delete session"
                >
                  ×
                </button>
              </div>
            ))}
        </div>
      )}
    </section>
  );
}

/* ========================= Challenges ========================= */
function Challenges({ focus, list, add, toggle, remove }) {
  const [draft, setDraft] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const generate = async () => {
    if (!focus.trim()) {
      setErr("Write what you want to learn this week first — it's the field at the top.");
      return;
    }
    setBusy(true);
    setErr("");
    try {
      const text = await askClaude([
        {
          role: "user",
          content: `A self-directed learner wants to learn about: "${focus}" this week.
Write 4 concrete, doable challenges that force them to APPLY the concept, not just read about it.
Each must be finishable in 20–90 minutes, use real companies, real numbers, or their own life, and have a visible output (a sheet, a paragraph, a pitch, a teardown).
Respond with ONLY a JSON array of strings. No preamble, no markdown.`,
        },
      ]);
      parseJSON(text).forEach((c) => add(String(c)));
    } catch (e) {
      setErr(e && e.message === "NO_KEY" ? KEY_MSG : "Could not build challenges. Try again.");
    }
    setBusy(false);
  };

  return (
    <section className="card" style={{ padding: "24px 26px" }}>
      <div className="eyebrow">Challenges</div>
      <h2 className="serif" style={{ fontSize: 24, margin: "4px 0 14px" }}>
        Prove you learned it
      </h2>

      <div style={{ display: "flex", gap: 10, marginBottom: 6 }}>
        <input
          className="inp"
          placeholder="Write your own challenge"
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter" && draft.trim()) {
              add(draft.trim());
              setDraft("");
            }
          }}
        />
        <button
          className="btn ghost"
          disabled={!draft.trim()}
          onClick={() => {
            add(draft.trim());
            setDraft("");
          }}
        >
          Add
        </button>
      </div>

      <button className="btn" style={{ width: "100%", marginTop: 12 }} disabled={busy} onClick={generate}>
        {busy ? "Writing challenges…" : "Build challenges from this week's focus"}
      </button>
      {err && <p style={{ color: C.deep, fontSize: 13, marginTop: 10 }}>{err}</p>}

      <div style={{ marginTop: 18 }}>
        {list.length === 0 && !busy && (
          <p style={{ color: C.slate, fontSize: 14 }}>
            No challenges yet. Add one, or build a set from your weekly focus.
          </p>
        )}
        {list.map((c) => (
          <div
            key={c.id}
            className="row"
            style={{
              display: "flex",
              gap: 10,
              padding: "10px 6px",
              borderBottom: `1px solid ${C.rule}`,
              alignItems: "flex-start",
            }}
          >
            <input
              type="checkbox"
              checked={c.done}
              onChange={() => toggle(c.id)}
              style={{ accentColor: C.blue, width: 16, height: 16, marginTop: 3 }}
            />
            <span
              style={{
                flex: 1,
                fontSize: 14,
                lineHeight: 1.45,
                color: c.done ? C.slate : C.ink,
                textDecoration: c.done ? "line-through" : "none",
              }}
            >
              {c.text}
            </span>
            <button
              onClick={() => remove(c.id)}
              style={{ border: "none", background: "none", color: C.slate, cursor: "pointer" }}
              aria-label="Remove challenge"
            >
              ×
            </button>
          </div>
        ))}
      </div>
    </section>
  );
}

/* =========================== Sources =========================== */
function Sources({ defaultQuery }) {
  const [q, setQ] = useState("");
  const [busy, setBusy] = useState(false);
  const [items, setItems] = useState([]);
  const [err, setErr] = useState("");

  useEffect(() => {
    if (defaultQuery && !q) setQ(defaultQuery);
  }, [defaultQuery]);

  const find = async () => {
    if (!q.trim()) return;
    setBusy(true);
    setErr("");
    setItems([]);
    try {
      const text = await askClaude(
        [
          {
            role: "user",
            content: `Find 5 genuinely good, currently available learning sources for someone studying "${q}" in business.
Mix formats: one book, one free course or video, one article or newsletter, one case study or real-world teardown, one podcast or talk.
Search the web to confirm they exist and get links.
Respond with ONLY a JSON array, no markdown:
[{"title":"","author":"","format":"Book|Course|Article|Case study|Podcast","minutes":"time to consume, e.g. 25 min","why":"one sentence on what this gives you","url":""}]`,
          },
        ],
        [{ type: "web_search_20250305", name: "web_search" }]
      );
      setItems(parseJSON(text));
    } catch (e) {
      setErr(e && e.message === "NO_KEY" ? KEY_MSG : "Search came back empty. Try rewording the topic.");
    }
    setBusy(false);
  };

  return (
    <section className="card" style={{ padding: "24px 26px" }}>
      <div className="eyebrow">Sources</div>
      <h2 className="serif" style={{ fontSize: 24, margin: "4px 0 14px" }}>
        Where to learn it
      </h2>

      <div style={{ display: "flex", gap: 10 }}>
        <input
          className="inp"
          placeholder="Type a topic — e.g. pricing strategy"
          value={q}
          onChange={(e) => setQ(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && find()}
        />
        <button className="btn" disabled={busy || !q.trim()} onClick={find}>
          {busy ? "Searching…" : "Find sources"}
        </button>
      </div>
      {err && <p style={{ color: C.deep, fontSize: 13, marginTop: 10 }}>{err}</p>}

      <div style={{ marginTop: 18, display: "grid", gap: 12 }}>
        {items.length === 0 && !busy && !err && (
          <p style={{ color: C.slate, fontSize: 14 }}>
            Search a topic and you'll get five sources — a book, a course, an article, a case
            study, and something to listen to.
          </p>
        )}
        {items.map((s, i) => (
          <div key={i} style={{ borderLeft: `2px solid ${C.blue}`, paddingLeft: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
              <span className="eyebrow" style={{ color: C.blue }}>{s.format}</span>
              <span className="mono" style={{ fontSize: 10, color: C.slate }}>{s.minutes}</span>
            </div>
            <div style={{ fontWeight: 600, fontSize: 15, margin: "2px 0" }}>
              {s.url ? (
                <a href={s.url} target="_blank" rel="noreferrer">
                  {s.title}
                </a>
              ) : (
                s.title
              )}
            </div>
            <div style={{ fontSize: 12, color: C.slate }}>{s.author}</div>
            <div style={{ fontSize: 13, marginTop: 4, lineHeight: 1.45 }}>{s.why}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

/* ======================= Calendar scan ======================= */
function CalendarScan({ weekKey, blocks, setBlocks, clear }) {
  const [img, setImg] = useState(null);      // { data, media, preview }
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const fileRef = useRef(null);

  const pick = async (file) => {
    if (!file) return;
    setErr("");
    const data = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(",")[1]);
      r.onerror = () => rej(new Error("read failed"));
      r.readAsDataURL(file);
    });
    setImg({ data, media: file.type, preview: URL.createObjectURL(file) });
  };

  const analyze = async () => {
    if (!img) return;
    setBusy(true);
    setErr("");
    try {
      const text = await askClaude([
        {
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: img.media, data: img.data },
            },
            {
              type: "text",
              text: `This is a screenshot of my weekly calendar. Read the booked events and find the gaps where I am free.
Only count gaps between 7:00 and 22:00, and only gaps of 30 minutes or more. Ignore gaps that look like commuting or meals if labeled.
Respond with ONLY a JSON array, no markdown:
[{"day":0,"start":"14:00","end":"15:30","minutes":90,"label":"gap after standup"}]
where day is 0 for Monday through 6 for Sunday. If a day is not visible in the screenshot, leave it out.`,
            },
          ],
        },
      ]);
      const found = parseJSON(text).map((b, i) => ({
        id: `${Date.now()}-${i}`,
        week: weekKey,
        day: Number(b.day),
        start: b.start,
        end: b.end,
        minutes: Number(b.minutes) || 0,
        label: b.label || "",
      }));
      if (!found.length) setErr("No open blocks found. Try a clearer or wider screenshot.");
      setBlocks(found);
    } catch (e) {
      setErr(e && e.message === "NO_KEY" ? KEY_MSG : "Couldn't read that calendar. Make sure times and events are legible.");
    }
    setBusy(false);
  };

  const totalFree = blocks.reduce((a, b) => a + b.minutes, 0);

  return (
    <section className="card" style={{ padding: "24px 26px" }}>
      <div className="eyebrow">Calendar</div>
      <h2 className="serif" style={{ fontSize: 24, margin: "4px 0 6px" }}>
        Find the hours you actually have
      </h2>
      <p style={{ fontSize: 14, color: C.slate, marginTop: 0, maxWidth: 620 }}>
        Drop in a screenshot of this week's calendar. Open blocks get read out of the gaps and
        drawn behind your study bars above.
      </p>

      <div
        style={{
          display: "grid",
          gridTemplateColumns: "minmax(240px, 1fr) 1.4fr",
          gap: 24,
          marginTop: 16,
          alignItems: "start",
        }}
      >
        <div>
          <div
            onClick={() => fileRef.current?.click()}
            onDragOver={(e) => e.preventDefault()}
            onDrop={(e) => {
              e.preventDefault();
              pick(e.dataTransfer.files[0]);
            }}
            style={{
              border: `1.5px dashed ${C.blue}`,
              background: C.sky,
              borderRadius: 2,
              minHeight: 160,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              cursor: "pointer",
              overflow: "hidden",
              padding: img ? 0 : 20,
              textAlign: "center",
            }}
          >
            {img ? (
              <img
                src={img.preview}
                alt="Calendar screenshot"
                style={{ width: "100%", display: "block" }}
              />
            ) : (
              <span style={{ fontSize: 14, color: C.deep, fontWeight: 600 }}>
                Click or drop a calendar screenshot
              </span>
            )}
          </div>
          <input
            ref={fileRef}
            type="file"
            accept="image/*"
            style={{ display: "none" }}
            onChange={(e) => pick(e.target.files[0])}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            <button className="btn" disabled={!img || busy} onClick={analyze}>
              {busy ? "Reading calendar…" : "Find free time"}
            </button>
            {blocks.length > 0 && (
              <button className="btn ghost" onClick={clear}>
                Clear
              </button>
            )}
          </div>
          {err && <p style={{ color: C.deep, fontSize: 13, marginTop: 10 }}>{err}</p>}
        </div>

        <div>
          {blocks.length === 0 ? (
            <p style={{ color: C.slate, fontSize: 14 }}>
              Free blocks will be listed here, day by day, with how long each one runs.
            </p>
          ) : (
            <>
              <div className="eyebrow" style={{ marginBottom: 10 }}>
                {Math.floor(totalFree / 60)}h {totalFree % 60}m open this week
              </div>
              <div style={{ display: "grid", gap: 6 }}>
                {blocks
                  .slice()
                  .sort((a, b) => a.day - b.day || a.start.localeCompare(b.start))
                  .map((b) => (
                    <div
                      key={b.id}
                      className="row"
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: 12,
                        padding: "8px 10px",
                        border: `1px solid ${C.rule}`,
                        background: C.white,
                      }}
                    >
                      <span
                        className="mono"
                        style={{
                          fontSize: 11,
                          fontWeight: 600,
                          background: C.blue,
                          color: "#fff",
                          padding: "3px 7px",
                        }}
                      >
                        {DAYS[b.day] || "?"}
                      </span>
                      <span className="mono" style={{ fontSize: 13 }}>
                        {b.start} – {b.end}
                      </span>
                      <span className="mono" style={{ fontSize: 11, color: C.blue }}>
                        {b.minutes}m
                      </span>
                      <span style={{ fontSize: 13, color: C.slate, flex: 1 }}>{b.label}</span>
                    </div>
                  ))}
              </div>
            </>
          )}
        </div>
      </div>
    </section>
  );
}

/* ============================ Course ============================ */
/* Three lessons, then three pieces of work. The quiz stays locked until
   every task is ticked. Finishing the work pays 20 XP, once. */
function Course({
  topic, course, cache, work, toggleWork, unlocked, bonusPaid, best, onQuiz, onClose,
}) {
  const [busy, setBusy] = useState(!course);
  const [err, setErr] = useState("");
  const [tab, setTab] = useState(0);

  useEffect(() => {
    if (course) return;
    (async () => {
      try {
        const text = await askClaude([
          {
            role: "user",
            content: `Build a short, punchy course on the business concept "${topic}" for a self-taught learner.
Return ONLY this JSON, no markdown:
{"brief":"two sentences on what this concept is and why it decides real money",
 "lessons":[{"title":"","points":["","",""],"example":"one concrete example with real numbers or a named company"}],
 "work":[{"task":"","output":"what they should end up holding"}]}
Exactly 3 lessons and exactly 3 pieces of work.
Lesson points: under 20 words each, plain language, no filler.
Work must be active — calculate something, tear down a real company, write a paragraph, interview someone. Each doable in 15–40 minutes. No "read an article".`,
          },
        ]);
        const c = parseJSON(text);
        if (!c.lessons?.length || !c.work?.length) throw new Error("bad shape");
        cache(c);
      } catch (e) {
        setErr(e && e.message === "NO_KEY" ? KEY_MSG : "Couldn't build the course. Close and open it again.");
      }
      setBusy(false);
    })();
  }, [topic]);

  const done = Object.values(work).filter(Boolean).length;
  const total = course ? course.work.length : 3;

  const shell = (children) => (
    <div
      style={{
        position: "fixed", inset: 0, background: "rgba(10,26,51,.6)", display: "flex",
        alignItems: "center", justifyContent: "center", zIndex: 55, padding: 20,
      }}
    >
      <div
        className="card"
        style={{ width: "100%", maxWidth: 660, padding: "26px 30px", maxHeight: "90vh", overflowY: "auto" }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div className="eyebrow">Course</div>
            <h2 className="serif" style={{ fontSize: 26, margin: "2px 0 0" }}>{topic}</h2>
          </div>
          <button
            onClick={onClose}
            style={{ border: "none", background: "none", fontSize: 20, color: C.slate, cursor: "pointer" }}
            aria-label="Close course"
          >
            ×
          </button>
        </div>
        {children}
      </div>
    </div>
  );

  if (busy)
    return shell(
      <p style={{ color: C.slate, fontSize: 14, marginTop: 18 }}>Writing your lessons and coursework…</p>
    );

  if (err || !course)
    return shell(
      <>
        <p style={{ color: C.deep, fontSize: 14, marginTop: 18 }}>{err || "No course yet."}</p>
        <button className="btn" onClick={onClose}>Close</button>
      </>
    );

  const L = course.lessons;
  const lesson = L[tab];

  return shell(
    <>
      <p style={{ fontSize: 15, lineHeight: 1.6, color: C.ink, margin: "12px 0 20px" }}>
        {course.brief}
      </p>

      {/* lesson tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
        {L.map((l, i) => (
          <button
            key={i}
            onClick={() => setTab(i)}
            className="mono"
            style={{
              flex: 1,
              padding: "8px 6px",
              fontSize: 11,
              fontWeight: 600,
              letterSpacing: ".06em",
              border: `1px solid ${i === tab ? C.blue : C.rule}`,
              background: i === tab ? C.blue : C.white,
              color: i === tab ? "#fff" : C.slate,
              cursor: "pointer",
              borderRadius: 2,
            }}
          >
            LESSON {i + 1}
          </button>
        ))}
      </div>

      <div style={{ border: `1px solid ${C.rule}`, padding: "18px 20px" }}>
        <h3 className="serif" style={{ fontSize: 20, margin: "0 0 12px" }}>{lesson.title}</h3>
        <ul style={{ margin: 0, paddingLeft: 18 }}>
          {lesson.points.map((p, i) => (
            <li key={i} style={{ fontSize: 14, lineHeight: 1.6, marginBottom: 6 }}>{p}</li>
          ))}
        </ul>
        {lesson.example && (
          <div style={{ marginTop: 14, background: C.sky, padding: "12px 14px", borderLeft: `2px solid ${C.blue}` }}>
            <div className="eyebrow" style={{ marginBottom: 4 }}>In practice</div>
            <p style={{ fontSize: 14, lineHeight: 1.55, margin: 0 }}>{lesson.example}</p>
          </div>
        )}
        {tab < L.length - 1 && (
          <button className="btn ghost" style={{ marginTop: 14 }} onClick={() => setTab(tab + 1)}>
            Next lesson →
          </button>
        )}
      </div>

      {/* the work */}
      <div style={{ marginTop: 24 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <div className="eyebrow">The work — {done}/{total} done</div>
          <div className="mono" style={{ fontSize: 10, color: bonusPaid ? C.blue : C.slate }}>
            {bonusPaid ? "+20 XP BANKED" : "+20 XP WHEN ALL THREE ARE DONE"}
          </div>
        </div>
        <div style={{ height: 3, background: C.sky, margin: "8px 0 12px" }}>
          <div className="bar" style={{ height: "100%", width: `${(done / total) * 100}%`, background: C.blue }} />
        </div>

        <div style={{ display: "grid", gap: 8 }}>
          {course.work.map((w, i) => {
            const on = !!work[i];
            return (
              <div
                key={i}
                style={{
                  display: "flex",
                  gap: 10,
                  padding: "12px 14px",
                  border: `1px solid ${on ? C.blue : C.rule}`,
                  background: on ? C.sky : C.white,
                  alignItems: "flex-start",
                }}
              >
                <input
                  type="checkbox"
                  checked={on}
                  onChange={() => toggleWork(i)}
                  style={{ accentColor: C.blue, width: 16, height: 16, marginTop: 2 }}
                />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, lineHeight: 1.45 }}>{w.task}</div>
                  {w.output && (
                    <div className="mono" style={{ fontSize: 10, color: C.slate, marginTop: 4, letterSpacing: ".04em" }}>
                      HAND IN: {w.output}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* the gate */}
      <div style={{ marginTop: 22, borderTop: `1px solid ${C.rule}`, paddingTop: 18 }}>
        <button
          className="btn"
          style={{ width: "100%", padding: "13px 0", fontSize: 14 }}
          disabled={!unlocked}
          onClick={onQuiz}
        >
          {unlocked ? "Take the quiz →" : `Quiz locked — finish the work (${done}/${total})`}
        </button>
        <p className="mono" style={{ fontSize: 10, color: C.slate, textAlign: "center", marginTop: 10 }}>
          10 QUESTIONS · 8 RIGHT = 40 XP · 9 RIGHT = 60 XP · 10 RIGHT = 100 XP
          {best !== undefined && ` · YOUR BEST ${best}%`}
        </p>
      </div>
    </>
  );
}

/* ============================ Quiz ============================ */
/* 10 questions. 8/10 → 40 XP, 9/10 → 60 XP, 10/10 → 100 XP.
   Anything under 8 earns nothing and the topic stays unchecked. */
function Quiz({ topic, onClose, onFinish }) {
  const [qs, setQs] = useState([]);
  const [i, setI] = useState(0);
  const [picks, setPicks] = useState([]);
  const [reveal, setReveal] = useState(null); // index picked for current q
  const [busy, setBusy] = useState(true);
  const [err, setErr] = useState("");
  const [result, setResult] = useState(null); // { pct, correct, earned }

  useEffect(() => {
    (async () => {
      try {
        const text = await askClaude([
          {
            role: "user",
            content: `Write a 10-question multiple-choice quiz on the business concept "${topic}".
Test real understanding: definitions, when to apply it, reading a small scenario, and spotting a wrong use of it. No trick questions.
Keep every question under 22 words and every option under 9 words. Vary which position the answer sits in.
Respond with ONLY a JSON array of 10 objects, no markdown:
[{"q":"","options":["","","",""],"answer":0,"why":"one short sentence explaining the right answer"}]`,
          },
        ]);
        const parsed = parseJSON(text).slice(0, 10);
        if (parsed.length < 10) throw new Error("short quiz");
        setQs(parsed);
      } catch (e) {
        setErr(e && e.message === "NO_KEY" ? KEY_MSG : "Couldn't build the quiz. Close and try again.");
      }
      setBusy(false);
    })();
  }, [topic]);

  const choose = (idx) => {
    if (reveal !== null) return;
    setReveal(idx);
    setPicks((p) => [...p, idx]);
  };

  const next = () => {
    if (i === qs.length - 1) {
      const correct = picks.filter((p, n) => p === qs[n].answer).length;
      const pct = correct * 10;
      const earned = onFinish(topic, pct);
      setResult({ pct, correct, earned });
    } else {
      setI(i + 1);
      setReveal(null);
    }
  };

  const shell = (children) => (
    <div
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(10,26,51,.6)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        zIndex: 50,
        padding: 20,
      }}
    >
      <div
        className="card"
        style={{ width: "100%", maxWidth: 560, padding: "26px 30px", maxHeight: "88vh", overflowY: "auto" }}
      >
        {children}
      </div>
    </div>
  );

  if (busy)
    return shell(
      <>
        <div className="eyebrow">Quiz</div>
        <h2 className="serif" style={{ fontSize: 24, margin: "4px 0 8px" }}>{topic}</h2>
        <p style={{ color: C.slate, fontSize: 14 }}>Writing ten questions…</p>
      </>
    );

  if (err)
    return shell(
      <>
        <p style={{ color: C.deep, fontSize: 14 }}>{err}</p>
        <button className="btn" onClick={onClose}>Close</button>
      </>
    );

  if (result) {
    const passed = result.earned > 0;
    return shell(
      <div style={{ textAlign: "center", padding: "10px 0" }}>
        <div className="eyebrow">{passed ? "Passed" : "Not yet"}</div>
        <div
          className="mono"
          style={{ fontSize: 56, fontWeight: 600, color: passed ? C.blue : C.slate, lineHeight: 1.1 }}
        >
          {result.pct}%
        </div>
        <p style={{ fontSize: 14, color: C.slate, marginTop: 4 }}>
          {result.correct} of 10 correct
        </p>
        {passed ? (
          <>
            <div
              className="serif"
              style={{ fontSize: 30, fontWeight: 600, color: C.deep, margin: "14px 0 2px" }}
            >
              +{result.earned} XP
            </div>
            <p style={{ fontSize: 14, color: C.slate, marginTop: 0 }}>
              {topic} is checked off the syllabus.
            </p>
          </>
        ) : (
          <p style={{ fontSize: 14, marginTop: 14, maxWidth: 380, marginInline: "auto" }}>
            You need 80% to bank XP and check this off. Study it, then take the quiz again —
            you'll get a fresh set of questions.
          </p>
        )}
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 20 }}>
          <button className="btn" onClick={onClose}>Done</button>
        </div>
        <div className="eyebrow" style={{ marginTop: 16 }}>
          80% = 40 XP &nbsp;·&nbsp; 90% = 60 XP &nbsp;·&nbsp; 100% = 100 XP
        </div>
      </div>
    );
  }

  const q = qs[i];
  return shell(
    <>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <div>
          <div className="eyebrow">Quiz</div>
          <h2 className="serif" style={{ fontSize: 22, margin: "2px 0 0" }}>{topic}</h2>
        </div>
        <button
          onClick={onClose}
          style={{ border: "none", background: "none", fontSize: 20, color: C.slate, cursor: "pointer" }}
          aria-label="Leave quiz"
        >
          ×
        </button>
      </div>

      <div style={{ display: "flex", gap: 3, margin: "16px 0 20px" }}>
        {qs.map((_, n) => (
          <div
            key={n}
            style={{
              flex: 1,
              height: 4,
              background:
                n < i ? (picks[n] === qs[n].answer ? C.blue : C.rule) : n === i ? C.deep : C.sky,
            }}
          />
        ))}
      </div>

      <div className="mono" style={{ fontSize: 11, color: C.slate }}>
        {String(i + 1).padStart(2, "0")} / 10
      </div>
      <p style={{ fontSize: 18, fontWeight: 600, lineHeight: 1.4, margin: "6px 0 18px" }}>{q.q}</p>

      <div style={{ display: "grid", gap: 8 }}>
        {q.options.map((o, n) => {
          const isAnswer = n === q.answer;
          const picked = reveal === n;
          let bg = C.white,
            bd = C.rule,
            fg = C.ink;
          if (reveal !== null) {
            if (isAnswer) {
              bg = C.sky;
              bd = C.blue;
              fg = C.deep;
            } else if (picked) {
              bd = C.slate;
              fg = C.slate;
            }
          }
          return (
            <button
              key={n}
              onClick={() => choose(n)}
              style={{
                textAlign: "left",
                border: `1.5px solid ${bd}`,
                background: bg,
                color: fg,
                padding: "12px 14px",
                borderRadius: 2,
                cursor: reveal === null ? "pointer" : "default",
                fontSize: 14,
                fontFamily: "'Public Sans', sans-serif",
                display: "flex",
                gap: 10,
              }}
            >
              <span className="mono" style={{ fontSize: 12, color: C.blue, fontWeight: 600 }}>
                {"ABCD"[n]}
              </span>
              <span style={{ flex: 1 }}>{o}</span>
              {reveal !== null && isAnswer && <span style={{ color: C.blue }}>✓</span>}
            </button>
          );
        })}
      </div>

      {reveal !== null && (
        <div style={{ marginTop: 16 }}>
          <p style={{ fontSize: 13, color: C.slate, lineHeight: 1.5, borderLeft: `2px solid ${C.blue}`, paddingLeft: 10 }}>
            {q.why}
          </p>
          <button className="btn" style={{ width: "100%", marginTop: 12 }} onClick={next}>
            {i === qs.length - 1 ? "See your score" : "Next question"}
          </button>
        </div>
      )}
    </>
  );
}

/* ---- 01. Term Match ---- */
function TermMatch({ onClose, onDone }) {
  const PAIRS = 8;
  const [round, setRound] = useState(0);
  const deck = useMemo(() => shuffle(TERM_BANK).slice(0, PAIRS), [round]);
  const [defs, setDefs] = useState(() => shuffle(deck.map((d, i) => i)));
  const [pickTerm, setPickTerm] = useState(null);
  const [matched, setMatched] = useState([]);
  const [wrong, setWrong] = useState(null);
  const [misses, setMisses] = useState(0);
  const [t, setT] = useState(0);
  const [over, setOver] = useState(null);

  useEffect(() => setDefs(shuffle(deck.map((d, i) => i))), [deck]);

  useEffect(() => {
    if (over) return;
    const id = setInterval(() => setT((x) => x + 1), 1000);
    return () => clearInterval(id);
  }, [over]);

  useEffect(() => {
    if (matched.length === PAIRS && !over) {
      const xp = Math.max(10, 30 - misses * 3 - Math.max(0, Math.floor((t - 60) / 15)));
      onDone("match", xp, PAIRS * 10 - misses);
      setOver({ xp });
    }
  }, [matched]);

  const tryPair = (defIdx) => {
    if (pickTerm === null || matched.includes(defIdx)) return;
    if (pickTerm === defIdx) {
      setMatched((m) => [...m, defIdx]);
      setPickTerm(null);
    } else {
      setMisses((x) => x + 1);
      setWrong(defIdx);
      setTimeout(() => setWrong(null), 450);
      setPickTerm(null);
    }
  };

  const reset = () => {
    setRound((r) => r + 1);
    setMatched([]);
    setMisses(0);
    setT(0);
    setPickTerm(null);
    setOver(null);
  };

  return (
    <GameShell
      title="Term Match"
      sub={`${matched.length}/${PAIRS} paired · ${misses} misses · ${t}s`}
      onClose={onClose}
      width={760}
    >
      {over ? (
        <GameOver
          headline={`${t} seconds`}
          detail={`All eight paired with ${misses} ${misses === 1 ? "miss" : "misses"}. Clean and fast pays best — no misses under a minute is the top score.`}
          xp={over.xp}
          onAgain={reset}
          onClose={onClose}
        />
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1.4fr", gap: 14 }}>
          <div style={{ display: "grid", gap: 6, alignContent: "start" }}>
            <div className="eyebrow" style={{ marginBottom: 2 }}>Terms</div>
            {deck.map((d, i) => {
              const done = matched.includes(i);
              const on = pickTerm === i;
              return (
                <button
                  key={d[0]}
                  disabled={done}
                  onClick={() => setPickTerm(i)}
                  style={{
                    textAlign: "left",
                    padding: "10px 12px",
                    fontSize: 14,
                    fontWeight: 600,
                    fontFamily: "'Public Sans',sans-serif",
                    border: `1.5px solid ${done ? C.rule : on ? C.deep : C.blue}`,
                    background: done ? C.sky : on ? C.blue : C.white,
                    color: done ? C.slate : on ? "#fff" : C.ink,
                    borderRadius: 2,
                    cursor: done ? "default" : "pointer",
                    textDecoration: done ? "line-through" : "none",
                  }}
                >
                  {d[0]}
                </button>
              );
            })}
          </div>

          <div style={{ display: "grid", gap: 6, alignContent: "start" }}>
            <div className="eyebrow" style={{ marginBottom: 2 }}>Definitions</div>
            {defs.map((di) => {
              const done = matched.includes(di);
              return (
                <button
                  key={di}
                  disabled={done}
                  onClick={() => tryPair(di)}
                  style={{
                    textAlign: "left",
                    padding: "10px 12px",
                    fontSize: 13,
                    lineHeight: 1.4,
                    fontFamily: "'Public Sans',sans-serif",
                    border: `1.5px solid ${wrong === di ? C.deep : done ? C.blue : C.rule}`,
                    background: done ? C.sky : wrong === di ? "#F3F6FC" : C.white,
                    color: done ? C.deep : C.ink,
                    borderRadius: 2,
                    cursor: done ? "default" : "pointer",
                  }}
                >
                  {done && <span style={{ color: C.blue, fontWeight: 600 }}>✓ </span>}
                  {deck[di][1]}
                </button>
              );
            })}
          </div>
        </div>
      )}
      {!over && (
        <p style={{ fontSize: 12, color: C.slate, marginTop: 14 }}>
          Click a term, then its definition. A wrong pair costs you 3 XP.
        </p>
      )}
    </GameShell>
  );
}

/* ---- 02. Ledger Drop ---- */
function LedgerDrop({ onClose, onDone }) {
  const KINDS = ["Asset", "Liability", "Equity"];
  const [queue, setQueue] = useState(() => shuffle(LEDGER_ITEMS));
  const [i, setI] = useState(0);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [flash, setFlash] = useState(null);
  const [time, setTime] = useState(60);
  const [over, setOver] = useState(null);

  useEffect(() => {
    if (over) return;
    if (time <= 0) {
      const xp = Math.min(30, score * 2);
      onDone("ledger", xp, score);
      setOver({ xp });
      return;
    }
    const id = setTimeout(() => setTime((t) => t - 1), 1000);
    return () => clearTimeout(id);
  }, [time, over]);

  const item = queue[i % queue.length];

  const answer = (k) => {
    const right = k === item[1];
    setFlash({ right, correct: item[1] });
    if (right) {
      setScore((s) => s + 1 + (streak >= 4 ? 1 : 0));
      setStreak((s) => s + 1);
    } else {
      setStreak(0);
    }
    setTimeout(() => {
      setFlash(null);
      setI((x) => x + 1);
    }, 500);
  };

  const reset = () => {
    setQueue(shuffle(LEDGER_ITEMS));
    setI(0);
    setScore(0);
    setStreak(0);
    setTime(60);
    setOver(null);
  };

  return (
    <GameShell
      title="Ledger Drop"
      sub={over ? "" : `${time}s left · score ${score}${streak >= 4 ? " · on fire, 2× points" : ""}`}
      onClose={onClose}
    >
      {over ? (
        <GameOver
          headline={`${score} sorted`}
          detail="Assets are what the business owns, liabilities are what it owes, equity is what's left for the owners. Five in a row doubles your points."
          xp={over.xp}
          onAgain={reset}
          onClose={onClose}
        />
      ) : (
        <>
          <div style={{ height: 4, background: C.sky, marginBottom: 20 }}>
            <div style={{ height: "100%", width: `${(time / 60) * 100}%`, background: C.blue }} />
          </div>
          <div
            style={{
              border: `1.5px solid ${flash ? (flash.right ? C.blue : C.slate) : C.rule}`,
              background: flash?.right ? C.sky : C.white,
              padding: "38px 20px",
              textAlign: "center",
              marginBottom: 16,
              borderRadius: 2,
            }}
          >
            <div className="serif" style={{ fontSize: 26, fontWeight: 600 }}>{item[0]}</div>
            {flash && (
              <div className="mono" style={{ fontSize: 12, color: flash.right ? C.blue : C.slate, marginTop: 8 }}>
                {flash.right ? "CORRECT" : `IT'S A ${flash.correct.toUpperCase()}`}
              </div>
            )}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10 }}>
            {KINDS.map((k) => (
              <button key={k} className="btn" style={{ padding: "16px 0" }} onClick={() => answer(k)}>
                {k}
              </button>
            ))}
          </div>
        </>
      )}
    </GameShell>
  );
}

      setOver({ xp });
      return;

/* ---- 04. Metric Sprint ---- */
function MetricSprint({ onClose, onDone }) {
  const N = 6;
  const build = () =>
    shuffle(METRIC_TEMPLATES)
      .slice(0, N)
      .map((f) => {
        const p = f();
        const opts = [p.answer];
        for (const w of p.wrong) if (!opts.includes(w) && opts.length < 4) opts.push(w);
        return { ...p, options: shuffle(opts) };
      });

  const [qs, setQs] = useState(build);
  const [i, setI] = useState(0);
  const [pick, setPick] = useState(null);
  const [right, setRight] = useState(0);
  const [over, setOver] = useState(null);

  const q = qs[i];

  const choose = (o) => {
    if (pick !== null) return;
    setPick(o);
    if (o === q.answer) setRight((r) => r + 1);
  };

  const next = () => {
    if (i === N - 1) {
      const correct = right;
      const xp = Math.round((correct / N) * 30);
      onDone("metric", xp, correct);
      setOver({ correct, xp });
    } else {
      setI(i + 1);
      setPick(null);
    }
  };

  const reset = () => {
    setQs(build());
    setI(0);
    setPick(null);
    setRight(0);
    setOver(null);
  };

  return (
    <GameShell
      title="Metric Sprint"
      sub={over ? "" : `Question ${i + 1} of ${N} · ${right} right`}
      onClose={onClose}
    >
      {over ? (
        <GameOver
          headline={`${over.correct}/${N} right`}
          detail="Every run generates fresh numbers, so there's nothing to memorise — only the formulas carry over."
          xp={over.xp}
          onAgain={reset}
          onClose={onClose}
        />
      ) : (
        <>
          <div style={{ display: "flex", gap: 3, marginBottom: 18 }}>
            {qs.map((_, n) => (
              <div
                key={n}
                style={{ flex: 1, height: 4, background: n < i ? C.blue : n === i ? C.deep : C.sky }}
              />
            ))}
          </div>
          <p style={{ fontSize: 18, fontWeight: 600, lineHeight: 1.45, margin: "0 0 18px" }}>{q.q}</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {q.options.map((o) => {
              const isAns = o === q.answer;
              const chosen = pick === o;
              let bg = C.white,
                bd = C.rule,
                fg = C.ink;
              if (pick !== null) {
                if (isAns) {
                  bg = C.sky;
                  bd = C.blue;
                  fg = C.deep;
                } else if (chosen) {
                  bd = C.slate;
                  fg = C.slate;
                }
              }
              return (
                <button
                  key={o}
                  onClick={() => choose(o)}
                  className="mono"
                  style={{
                    border: `1.5px solid ${bd}`,
                    background: bg,
                    color: fg,
                    padding: "14px 12px",
                    fontSize: 15,
                    fontWeight: 600,
                    cursor: pick === null ? "pointer" : "default",
                    borderRadius: 2,
                  }}
                >
                  {o}
                </button>
              );
            })}
          </div>
          {pick !== null && (
            <div style={{ marginTop: 16 }}>
              <p style={{ fontSize: 13, color: C.slate, borderLeft: `2px solid ${C.blue}`, paddingLeft: 10, lineHeight: 1.5 }}>
                {q.why}
              </p>
              <button className="btn" style={{ width: "100%", marginTop: 12 }} onClick={next}>
                {i === N - 1 ? "See your score" : "Next"}
              </button>
            </div>
          )}
        </>
      )}
    </GameShell>
  );
}

/* ---- 05. Startup Runway ---- */
function StartupRunway({ onClose, onDone }) {
  const START = 8000;
  const [deck, setDeck] = useState(() => shuffle(SCENARIOS).slice(0, 6));
  const [i, setI] = useState(0);
  const [cash, setCash] = useState(START);
  const [cust, setCust] = useState(120);
  const [result, setResult] = useState(null); // chosen option
  const [over, setOver] = useState(null);

  const s = deck[i];

  const choose = (o) => {
    if (result) return;
    const revenue = Math.round(cust * 2.5); // each customer throws off ~$2.50 profit this round
    setCash((c) => c + o.cash + revenue);
    setCust((c) => Math.max(0, c + o.cust));
    setResult({ ...o, revenue });
  };

  const next = () => {
    if (i === deck.length - 1) {
      const score = Math.round(cash / 100);
      const xp = Math.max(5, Math.min(40, Math.round(((cash - START) / START) * 25 + 15)));
      onDone("runway", xp, score);
      setOver({ xp });
    } else {
      setI(i + 1);
      setResult(null);
    }
  };

  const reset = () => {
    setDeck(shuffle(SCENARIOS).slice(0, 6));
    setI(0);
    setCash(START);
    setCust(120);
    setResult(null);
    setOver(null);
  };

  return (
    <GameShell title="Startup Runway" sub={over ? "" : `Decision ${i + 1} of ${deck.length}`} onClose={onClose}>
      {over ? (
        <GameOver
          headline={money(cash)}
          detail={
            cash <= 0
              ? "You ran out of cash. Profitable businesses die of cash flow problems all the time — that's the lesson."
              : `You started with ${money(START)} and ${120} customers, and finished with ${cust}. Every choice traded cash for growth, or growth for safety.`
          }
          xp={over.xp}
          onAgain={reset}
          onClose={onClose}
        />
      ) : (
        <>
          <div
            style={{
              display: "flex",
              gap: 24,
              padding: "12px 16px",
              background: C.sky,
              border: `1px solid ${C.rule}`,
              marginBottom: 18,
            }}
          >
            <div>
              <div className="eyebrow">Cash</div>
              <div className="mono" style={{ fontSize: 20, fontWeight: 600, color: cash > 0 ? C.blue : C.slate }}>
                {money(cash)}
              </div>
            </div>
            <div>
              <div className="eyebrow">Customers</div>
              <div className="mono" style={{ fontSize: 20, fontWeight: 600 }}>{cust}</div>
            </div>
          </div>

          <p style={{ fontSize: 16, lineHeight: 1.55, margin: "0 0 18px" }}>{s.setup}</p>

          {!result ? (
            <div style={{ display: "grid", gap: 8 }}>
              {s.options.map((o) => (
                <button
                  key={o.label}
                  onClick={() => choose(o)}
                  style={{
                    textAlign: "left",
                    border: `1.5px solid ${C.rule}`,
                    background: C.white,
                    padding: "14px 16px",
                    fontSize: 14,
                    fontWeight: 600,
                    fontFamily: "'Public Sans',sans-serif",
                    cursor: "pointer",
                    borderRadius: 2,
                  }}
                  onMouseEnter={(e) => (e.currentTarget.style.borderColor = C.blue)}
                  onMouseLeave={(e) => (e.currentTarget.style.borderColor = C.rule)}
                >
                  {o.label}
                </button>
              ))}
            </div>
          ) : (
            <div>
              <div
                style={{
                  border: `1px solid ${C.blue}`,
                  background: C.sky,
                  padding: "14px 16px",
                }}
              >
                <div className="mono" style={{ fontSize: 12, color: C.deep, marginBottom: 6 }}>
                  {result.cash >= 0 ? "+" : "−"}{money(Math.abs(result.cash))} decision · +{money(result.revenue)} sales ·{" "}
                  {result.cust >= 0 ? "+" : "−"}{Math.abs(result.cust)} customers
                </div>
                <p style={{ fontSize: 14, lineHeight: 1.55, margin: 0 }}>{result.lesson}</p>
              </div>
              <button className="btn" style={{ width: "100%", marginTop: 14 }} onClick={next}>
                {i === deck.length - 1 ? "See where you landed" : "Next decision"}
              </button>
            </div>
          )}
        </>
      )}
    </GameShell>
  );
}

/* ========================== Checklist ========================== */
function Checklist({ checked, scores, workCount, unlocked, onCourse, onReset, onStudy }) {
  const [filter, setFilter] = useState("");
  const [hideDone, setHideDone] = useState(false);

  return (
    <section className="card" style={{ padding: "24px 26px" }}>
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          alignItems: "flex-end",
          flexWrap: "wrap",
          gap: 12,
        }}
      >
        <div>
          <div className="eyebrow">The syllabus</div>
          <h2 className="serif" style={{ fontSize: 24, margin: "4px 0 2px" }}>
            Learn it, work it, then prove it
          </h2>
          <p className="mono" style={{ fontSize: 11, color: C.slate, margin: 0 }}>
            3 lessons · 3 pieces of work (+20 XP) · quiz unlocks after · 8/10 = 40 XP · 9/10 = 60 XP · 10/10 = 100 XP
          </p>
        </div>
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <input
            className="inp"
            style={{ width: 200 }}
            placeholder="Filter topics"
            value={filter}
            onChange={(e) => setFilter(e.target.value)}
          />
          <label
            style={{ fontSize: 13, color: C.slate, display: "flex", gap: 6, alignItems: "center" }}
          >
            <input
              type="checkbox"
              checked={hideDone}
              onChange={() => setHideDone(!hideDone)}
              style={{ accentColor: C.blue }}
            />
            Hide learned
          </label>
        </div>
      </div>

      <div
        style={{
          marginTop: 22,
          display: "grid",
          gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))",
          gap: 26,
        }}
      >
        {TOPICS.map((group) => {
          const items = group.items.filter(
            (i) =>
              i.toLowerCase().includes(filter.toLowerCase()) && !(hideDone && checked[i])
          );
          if (!items.length) return null;
          const done = group.items.filter((i) => checked[i]).length;
          const pct = Math.round((done / group.items.length) * 100);
          return (
            <div key={group.cat}>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "baseline",
                }}
              >
                <h3
                  style={{
                    fontSize: 14,
                    fontWeight: 600,
                    margin: 0,
                    textTransform: "uppercase",
                    letterSpacing: ".06em",
                  }}
                >
                  {group.cat}
                </h3>
                <span className="mono" style={{ fontSize: 11, color: C.slate }}>
                  {done}/{group.items.length}
                </span>
              </div>
              <div style={{ height: 3, background: C.sky, margin: "8px 0 10px" }}>
                <div
                  className="bar"
                  style={{ height: "100%", width: `${pct}%`, background: C.blue }}
                />
              </div>

              {items.map((name) => {
                const on = !!checked[name];
                const best = scores[name];
                const wc = workCount(name);
                const started = wc.total > 0;
                const ready = unlocked(name);
                return (
                  <div
                    key={name}
                    className="row"
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 9,
                      padding: "6px 4px",
                    }}
                  >
                    <button
                      onClick={() => (on ? onReset(name) : onCourse(name))}
                      aria-label={on ? `Uncheck ${name}` : `Open the ${name} course`}
                      style={{
                        width: 16,
                        height: 16,
                        flexShrink: 0,
                        border: `1.5px solid ${on ? C.blue : C.rule}`,
                        background: on ? C.blue : C.white,
                        color: "#fff",
                        fontSize: 11,
                        lineHeight: 1,
                        padding: 0,
                        cursor: "pointer",
                        borderRadius: 2,
                      }}
                    >
                      {on ? "✓" : ""}
                    </button>
                    <span
                      style={{
                        fontSize: 14,
                        flex: 1,
                        color: on ? C.slate : C.ink,
                        textDecoration: on ? "line-through" : "none",
                      }}
                    >
                      {name}
                    </span>

                    {on ? (
                      <span className="mono" style={{ fontSize: 10, color: C.blue }}>
                        {best ? `${best}%` : checked[name]?.slice(5)}
                      </span>
                    ) : (
                      <span style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        {started && (
                          <span className="mono" style={{ fontSize: 10, color: ready ? C.blue : C.slate }}>
                            {ready ? "QUIZ READY" : `WORK ${wc.done}/${wc.total}`}
                          </span>
                        )}
                        <button
                          onClick={() => onStudy(name)}
                          className="mono"
                          title="Make this the week's focus"
                          style={{
                            border: "none",
                            background: "none",
                            color: C.slate,
                            fontSize: 10,
                            cursor: "pointer",
                            letterSpacing: ".08em",
                          }}
                        >
                          FOCUS
                        </button>
                        <button
                          onClick={() => onCourse(name)}
                          className="mono"
                          style={{
                            border: `1px solid ${ready ? C.blue : C.rule}`,
                            background: ready ? C.blue : C.white,
                            color: ready ? "#fff" : C.blue,
                            fontSize: 10,
                            fontWeight: 600,
                            padding: "3px 6px",
                            cursor: "pointer",
                            letterSpacing: ".08em",
                            borderRadius: 2,
                          }}
                        >
                          {started ? (ready ? "QUIZ" : "RESUME") : "START"}
                        </button>
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </section>
  );
}


class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ fontFamily: "system-ui, sans-serif", maxWidth: 640, margin: "60px auto", padding: "0 24px", color: "#0A1A33" }}>
          <h1 style={{ fontSize: 24 }}>The Business Ledger</h1>
          <p style={{ color: "#8B3A3A" }}>Something went wrong: {String(this.state.error.message || this.state.error)}</p>
          <p style={{ color: "#5A6B85", fontSize: 14 }}>Try reloading the page.</p>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><BusinessLedger /></ErrorBoundary>);
</script>
<script>
  (function () {
    function fail(msg) {
      var r = document.getElementById("root");
      if (r) r.innerHTML = '<div style="font-family:system-ui,sans-serif;max-width:640px;margin:60px auto;padding:0 24px;color:#0A1A33"><h1>The Business Ledger</h1><p style="color:#8B3A3A">Failed to start: ' + msg + '</p><p style="color:#5A6B85;font-size:14px">Check your internet connection and reload.</p></div>';
    }
    function run() {
      try {
        if (!window.React || !window.ReactDOM) { fail("React failed to load from the CDN."); return; }
        var src = document.getElementById("ledger-src").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        var s = document.createElement("script");
        s.textContent = out;
        document.body.appendChild(s);
      } catch (e) {
        fail(e && e.message ? e.message : String(e));
        throw e;
      }
    }
    function start() {
      if (window.Babel) { run(); return; }
      // Babel didn't load from the primary CDN — try a fallback before giving up.
      var fb = document.createElement("script");
      fb.src = "https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js";
      fb.onload = run;
      fb.onerror = function () { fail("Babel failed to load from both CDNs."); };
      document.head.appendChild(fb);
    }
    if (document.readyState === "complete") start();
    else window.addEventListener("load", start);
  })();
</script>
